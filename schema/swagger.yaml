openapi: 3.0.3
info:
  title: GenieLab API
  description: A user and organisation management API with JWT authentication
  version: 1.0.0
servers:
  - url: http://localhost:3000/api
    description: Local development server
  - url: https://yourdomain.com/api
    description: Production server

paths:
  /auth/login:
    post:
      summary: User login
      description: Authenticate a user and receive a JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLogin'
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users:
    get:
      summary: Get all users
      description: Retrieve a list of all users (root role required)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: A list of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserInfo'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Create a new user
      description: Create a new user (root role required)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUser'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfo'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{userId}:
    get:
      summary: Get a specific user
      description: Retrieve details of a specific user by ID (root role required)
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfo'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /organisations:
    post:
      summary: Create a new organisation
      description: Create a new organisation with a root user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrganisation'
      responses:
        '201':
          description: Organisation and root user created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  organisation:
                    $ref: '#/components/schemas/Organisation'
                  user:
                    $ref: '#/components/schemas/UserInfo'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    Token:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
          description: JWT token
    UserLogin:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: johndoe@example.com
          description: User email
        password:
          type: string
          format: password
          example: password123
          description: User password
    UserInfo:
      type: object
      properties:
        id:
          type: string
          example: 5f8d0d55b547644294b9e7f8
        username:
          type: string
          example: johndoe
        email:
          type: string
          format: email
          example: johndoe@example.com
        organisationId:
          type: string
          example: 5f8d0d55b547644294b9e7f9
        role:
          type: string
          enum: [root, admin, user]
          example: user
      required:
        - id
        - username
        - email
        - organisationId
        - role
    CreateUser:
      type: object
      required:
        - username
        - email
        - password
        - role
      properties:
        username:
          type: string
          example: johndoe
          description: User username
        email:
          type: string
          format: email
          example: johndoe@example.com
          description: User email
        password:
          type: string
          example: <PASSWORD>
          description: User password
        role:
          type: string
          example: admin
          description: User role
    Organisation:
      type: object
      properties:
        id:
          type: string
          example: 5f8d0d55b547644294b9e7f9
        name:
          type: string
          example: Acme Corporation
      required:
        - id
        - name
    CreateOrganisation:
      type: object
      required:
        - organisationName
        - username
        - email
        - password
      properties:
        organisationName:
          type: string
          example: Acme Corporation
          description: Organisation name
        username:
          type: string
          example: johndoe
          description: User username
        email:
          type: string
          format: email
          example: johndoe@example.com
          description: User email
        password:
          type: string
          example: <PASSWORD>
          description: User password
    Error:
      type: object
      properties:
        message:
          type: string
          example: Error description
        errors:
          type: array
          items:
            type: string
          example: ["Field is required"]
      required:
        - message

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT