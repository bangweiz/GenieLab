openapi: 3.0.3
info:
  title: GenieLab API
  description: A user and organisation management API with JWT authentication
  version: 1.0.0
servers:
  - url: http://localhost:3000/api
    description: Local development server
  - url: https://yourdomain.com/api
    description: Production server
tags:
  - name: Auth
    description: Authentication endpoints
  - name: Organisation
    description: Organisation management endpoints
  - name: User
    description: User management endpoints
  - name: Instruction
    description: Instruction management endpoints

paths:
  /auth/login:
    post:
      summary: User login
      tags: [Auth]
      description: Authenticate a user and receive a JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLogin'
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users:
    get:
      summary: Get all users
      tags: [User]
      description: Retrieve a list of all users (root role required)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: A list of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserInfo'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Create a new user
      tags: [User]
      description: Create a new user (root role required)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUser'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfo'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{userId}:
    get:
      summary: Get a specific user
      tags: [User]
      description: Retrieve details of a specific user by ID (root role required)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/userId'
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfo'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /organisations:
    post:
      summary: Create a new organisation
      tags: [Organisation]
      description: Create a new organisation with a root user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrganisation'
      responses:
        '201':
          description: Organisation and root user created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  organisation:
                    $ref: '#/components/schemas/Organisation'
                  user:
                    $ref: '#/components/schemas/UserInfo'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /instructions:
    get:
      summary: Get all instructions
      tags: [Instruction]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InstructionInfo'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Create a new instruction
      tags: [Instruction]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInstruction'
      responses:
        '201':
          description: The created instruction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstructionInfo'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /instructions/{instructionId}:
    get:
      summary: Get an instruction
      tags: [Instructions]
      parameters:
        - $ref: '#/components/parameters/instructionId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstructionInfo'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Update an instruction
      description: Update an instruction
      tags: [Instructions]
      parameters:
        - $ref: '#/components/parameters/instructionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInstruction'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstructionInfo'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'


components:
  parameters:
    userId:
      in: path
      name: userId
      required: true
      schema:
        type: string
    instructionId:
      in: path
      name: instructionId
      required: true
      schema:
        type: string
  schemas:
    Token:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
          description: JWT token
    UserLogin:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: johndoe@example.com
          description: User email
        password:
          type: string
          format: password
          example: password123
          description: User password
    UserInfo:
      type: object
      properties:
        id:
          type: string
          example: 5f8d0d55b547644294b9e7f8
        username:
          type: string
          example: johndoe
        email:
          type: string
          format: email
          example: johndoe@example.com
        organisationId:
          type: string
          example: 5f8d0d55b547644294b9e7f9
        role:
          type: string
          enum: [root, admin, user]
          example: user
      required:
        - id
        - username
        - email
        - organisationId
        - role
    CreateUser:
      type: object
      required:
        - username
        - email
        - password
        - role
      properties:
        username:
          type: string
          example: johndoe
          description: User username
        email:
          type: string
          format: email
          example: johndoe@example.com
          description: User email
        password:
          type: string
          example: <PASSWORD>
          description: User password
        role:
          type: string
          example: admin
          description: User role
    Organisation:
      type: object
      properties:
        id:
          type: string
          example: 5f8d0d55b547644294b9e7f9
        name:
          type: string
          example: Acme Corporation
      required:
        - id
        - name
    CreateOrganisation:
      type: object
      required:
        - organisationName
        - username
        - email
        - password
      properties:
        organisationName:
          type: string
          example: Acme Corporation
          description: Organisation name
        username:
          type: string
          example: johndoe
          description: User username
        email:
          type: string
          format: email
          example: johndoe@example.com
          description: User email
        password:
          type: string
          example: <PASSWORD>
          description: User password
    InstructionInfo:
      type: object
      required:
        - instructionId
        - name
        - content
        - version
        - type
      properties:
        instructionId:
          type: string
          format: uuid
          example: 5f8d0d55b547644294b9e7f8
        name:
          type: string
          example: My Instruction
          description: Instruction name
        content:
          type: string
          description: Instruction content
          example: Lorem ipsum dolor sit amet, consectetur adipiscing elit.
        version:
          type: integer
          example: 1
        type:
          type: string
          enum: [personality, guardian, operation]
          description: Instruction type
    CreateInstruction: 
      type: object
      required:
        - name
        - content
        - type
      properties:
        name:
          type: string
          example: My Instruction
          description: Instruction name
        content:
          type: string
          description: Instruction content
          example: Lorem ipsum dolor sit amet, consectetur adipiscing elit.
        type:
          type: string
          enum: [personality, guardian, operation]
          description: Instruction type
    UpdateInstruction:
      type: object
      properties:
        name:
          type: string
          example: My Instruction
          description: Instruction name
        content:
          type: string
          description: Instruction content
          example: Lorem ipsum dolor sit amet, consectetur adipiscing elit.
  
    Error:
      type: object
      properties:
        message:
          type: string
          example: Error description
        errors:
          type: array
          items:
            type: string
          example: ["Field is required"]
      required:
        - message

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT